<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodePilot360 - Coming Soon</title>
    <meta name="description" content="CodePilot360 is launching soon." />
    <style>
        :root {
            --bg-a: #081124;
            --bg-b: #10284d;
            --accent-a: #22d3ee;
            --accent-b: #3b82f6;
            --text: #eaf2ff;
            --muted: #a7bbd7;
            --card: rgba(255, 255, 255, .06);
            --line: rgba(255, 255, 255, .18);
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        body {
            margin: 0;
            font-family: "Plus Jakarta Sans", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(900px 600px at 15% -10%, #1d4ed833 0%, transparent 60%),
                radial-gradient(700px 500px at 100% 10%, #22d3ee22 0%, transparent 60%),
                linear-gradient(140deg, var(--bg-a), var(--bg-b));
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .04) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: radial-gradient(circle at 50% 50%, #000 35%, transparent 85%);
            pointer-events: none;
        }

        .card {
            width: min(760px, 92vw);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            padding: 44px 34px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
            animation: rise .7s ease-out both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: .9rem;
            margin-bottom: 18px;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: linear-gradient(120deg, var(--accent-a), var(--accent-b));
            box-shadow: 0 0 14px var(--accent-a);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.6rem);
            line-height: 1.05;
            letter-spacing: .02em;
        }

        .brand {
            background: linear-gradient(120deg, var(--accent-a), var(--accent-b));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p {
            margin: 16px auto 28px;
            max-width: 56ch;
            color: var(--muted);
            font-size: clamp(1rem, 2.1vw, 1.12rem);
            line-height: 1.65;
        }

        .meta {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            color: #c5d5ee;
            font-size: .92rem;
        }

        .pill {
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, .03);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(14px) scale(.985)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }
    </style>
</head>

<body>
    <div class="grid-overlay" aria-hidden="true"></div>

    <main class="card">
        <div class="badge"><span class="dot"></span>Launching Soon</div>
        <h1><span class="brand">CodePilot360</span><br />Coming Soon</h1>
        <p>
            We’re building an intelligent development platform to help teams ship faster,
            with cleaner architecture and better engineering flow.
        </p>
        <div class="meta">
            <span class="pill">codepilot360.com</span>
            <span class="pill">Product in Progress</span>
            <span class="pill">Stay Tuned</span>
        </div>
    </main>
</body>

</html>
